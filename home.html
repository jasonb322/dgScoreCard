<!DOCTYPE html>
<html lang="en">

<head>
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-VL7B0ZY37H"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag() { dataLayer.push(arguments); }
		gtag('js', new Date());

		gtag('config', 'G-VL7B0ZY37H');
	</script>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description"
		content="dgScoreCard is a progressive web app that is designed to make keeping disc golf scoring quick and easy. Start scoring now, without the need to login or make an account. Simply go to dgscorecard.com to start using the app.">


	<!-- Google Font Import -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

	<link rel="icon" type="image/x-icon" href="/images/favicon.ico">
	<link rel="manifest" href="/images/manifest.json">

	<link rel="stylesheet" type="text/css" href="./style.css" />
	<link rel="stylesheet" type="text/css" href="./home.css" />

	<title>dgScoreCard Help</title>
</head>

<body>
	<header id="versionID">
		<img src="./images/android-chrome-512x512.png" id="logoImg" class="headerLogo" alt="DG ScoreCard Logo">
		<p id="versionID">Beta v0.12.3</p>
	</header>

	<h2>Helpful Stuff</h2>

	<div id="buttonContainerHomeView" style="display: inline-flex; flex-direction: column;">

		<a href="./userGuide.html">
			<button id="userGuideBtn" class="buttonHomeView">User Guide</button>
		</a>

		<a href="./install.html">
			<button id="installBtn" class="buttonHomeView">Install As Tile</button>
		</a>

		<a
			href="https://docs.google.com/forms/d/e/1FAIpQLSc8jA-r_G9lC1AK7ZmbvOEwThIiJ2quoN-alLU0VCyLCv7Enw/viewform?usp=sf_link">
			<button id="contactBtn" class="buttonHomeView">Contact dgScoreCard</button>
		</a>

		<button id="newRoundBtn" onclick="newRound()" class="buttonHomeView">New Round</button>

		<p id="labelForBmacBtn">If you enjoy dgScoreCard, please consider becoming a supporter.</p>
		<a href="https://www.buymeacoffee.com/dgscorecard" target="_blank">
			<img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" id="bmacBtn">
		</a>

	</div>

	<div class="menu-bar">
		<a href="./addPlayers.html">
			<img src="./images/viewIcons/playersIcon.png" alt="Players Icon" id="playersIcon" class="menuIcons">
		</a>
		<a href="./scoring.html">
			<img src="./images/viewIcons/scoringIcon.png" alt="Scoring Icon" id="scoringIcon" class="menuIcons">
		</a>
		<a href="./fullCard.html">
			<img src="./images/viewIcons/fullCardIcon.png" alt="Full Card Icon" id="fullCardIcon" class="menuIcons">
		</a>
		<a href="./home.html">
			<img src="./images/viewIcons/helpIcon.png" alt="Help Icon" id="helpIcon" class="menuIconActive">
		</a>
	</div>

	<!-- Pad bottom of the page to prevent hiding behind menu bar. -->
	<br><br><br>

	<script src="./home.js"></script>

	<!-- EVENTUALLY MOVE THIS TO home.js -->
	<script>
		const newRound = () => {
			let userDeleteConfirmation = window.confirm("Do you want to delete any open cards start a new round?");
			if (userDeleteConfirmation) {
				localStorage.removeItem('scoreCard');
				window.open("./addPlayers.html");
			}
		}
	</script>
</body>

</html>
